[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm install && npm run build || echo 'No build step'"

[[scheduled_functions]]
  name = "auto-grade"
  cron = "*/15 * * * *"

[[scheduled_functions]]
  name = "accuracy-status"
  cron = "*/20 * * * *"

[[scheduled_functions]]
  name = "alert-engine"
  cron = "*/10 * * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  TZ = "America/New_York"
